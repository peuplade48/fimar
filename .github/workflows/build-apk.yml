name: 🔨 FİMAR APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü seçin'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL'
        required: false
        default: ''

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: PROJE DOSYALARINI DOĞRU YERE TAŞI (Hata Çözücü) ──────
      - name: 🛠️ Proje Yapısını Düzelt
        run: |
          # Eğer her şey 'android' klasörünün içindeyse dışarı çıkar
          if [ -d "android" ]; then
            echo "Dosyalar android klasöründen ana dizine taşınıyor..."
            cp -r android/* .
            rm -rf android
          fi
          
          # Eğer 'app' klasörü yoksa ama 'fimar' veya başka isimde bir klasör varsa onu 'app' yap
          if [ ! -d "app" ]; then
             # İçinde build.gradle olan ilk klasörü 'app' olarak adlandır
             POTENTIAL_APP=$(find . -maxdepth 2 -name "build.gradle" -not -path "./build.gradle" | head -n 1 | cut -d '/' -f 2)
             if [ ! -z "$POTENTIAL_APP" ] && [ "$POTENTIAL_APP" != "app" ]; then
                mv "$POTENTIAL_APP" app
                echo "Klasör ismi düzeltildi: $POTENTIAL_APP -> app"
             fi
          fi

      # ── 2. ADIM: WRAPPER VE SETTINGS TAMİRİ ──────────────────────────
      - name: 🛠️ Gradle Yapılandırmasını Sıfırla
        run: |
          # Mevcut wrapper'ları temizle
          rm -rf gradle/ gradlew gradlew.bat
          # Yeni wrapper oluştur
          gradle wrapper --gradle-version 8.2
          chmod +x ./gradlew
          
          # settings.gradle dosyasını garantiye al
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'fimar'" >> settings.gradle

      # ── 3. ADIM: URL GÜNCELLEME ──────────────────────────────────────
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          find . -name "MainActivity.kt" -exec sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" {} +
          find . -name "build.gradle" -exec sed -i "s|\"http://192.168.1.100/fimar/index.php\"|\"$SERVER\"|g" {} +

      # ── 4. ADIM: KEYSTORE HAZIRLA ────────────────────────────────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: (github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')) && env.MY_KEYSTORE_SECRET != ''
        run: |
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/fimar-release.keystore

      # ── 5. ADIM: BUILD ───────────────────────────────────────────────
      - name: 🛠️ APK Build
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" == "release" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ./gradlew assembleRelease --no-daemon \
              -PKEYSTORE_FILE="fimar-release.keystore" \
              -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
              -Porg.gradle.jvmargs="-Xmx3g"
          else
            ./gradlew assembleDebug --no-daemon -Porg.gradle.jvmargs="-Xmx3g"
          fi

      # ── 6. ADIM: ARTIFACTS ───────────────────────────────────────────
      - name: 📤 APK Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: fimar-apk-${{ github.run_number }}
          path: "**/*.apk"
