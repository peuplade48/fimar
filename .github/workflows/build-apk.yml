name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: VERSİYON BELİRLE ────────────────────────────────────
      - name: 🏷️ Versiyonu Belirle
        id: versioning
        run: |
          # Build numarasını kullanarak 1.0.X formatında versiyon oluşturur
          # Örn: Build 205 ise Versiyon 1.0.205 olur. Bu hata yapmaz.
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "tag=$VERSION_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION_NAME" || echo "Tag zaten var, atlanıyor."
          git push origin "$VERSION_NAME" || echo "Push zaten yapılmış, atlanıyor."

      # ── 2. ADIM: PROJE HAZIRLA ─────────────────────────────────────
      - name: 🛠️ Dosyaları Hazırla
        run: |
          if [ -d "android" ]; then cp -r android/* .; rm -rf android; fi
          chmod +x ./gradlew

      # ── 3. ADIM: APK BUILD (KESİN YÖNTEM) ───────────────────────────
      - name: 🛠️ APK Build
        run: |
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VARIANT=$(echo "$TYPE" | awk '{print toupper(substr($0,1,1))substr($0,2)}')
          
          ./gradlew clean assemble$VARIANT --no-daemon \
            -PVERSION_NAME="${{ steps.versioning.outputs.tag }}" \
            -PVERSION_CODE="${{ github.run_number }}"

      # ── 4. ADIM: RELEASE ───────────────────────────────────────────
      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: "app/build/outputs/apk/**/*.apk"
          name: "Apartman Takip v${{ steps.versioning.outputs.tag }}"
          tag_name: ${{ steps.versioning.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
