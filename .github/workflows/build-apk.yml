name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Dosyaları Hazırla ve Sürümü Gömmek
        run: |
          # 1. Klasör düzenini ayarla
          if [ -d "android" ]; then 
            cp -r android/* .
            rm -rf android
          fi
          
          # 2. Sürüm numaralarını hesapla
          V_CODE=${{ github.run_number }}
          V_NAME="1.0.${{ github.run_number }}"
          
          # 3. build.gradle dosyasındaki SAHTE değerleri GERÇEK değerlerle değiştir (KESİN ÇÖZÜM)
          # 'versionCode 12345' yazan yeri bulup 'versionCode X' yapar
          sed -i "s/versionCode 12345/versionCode $V_CODE/g" app/build.gradle
          # 'versionName "1.0.0"' yazan yeri bulup 'versionName "1.0.X"' yapar
          sed -i "s/versionName \"1.0.0\"/versionName \"$V_NAME\"/g" app/build.gradle
          
          # Kontrol için dosyayı ekrana yazdır (Loglarda görebilirsin)
          grep -E "versionCode|versionName" app/build.gradle
          
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      - name: 🛠️ APK Build
        run: ./gradlew clean assembleRelease --no-daemon

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "app/build/outputs/apk/**/*.apk"
          name: "Apartman Takip v1.0.${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
