name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL Adresi'
        required: true
        default: 'https://falzer4.peuplade.com.tr'

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: VERSİYON BELİRLE ────────────────────────────────────
      - name: 🏷️ Versiyonu Hesapla
        id: tagger
        run: |
          LAST_TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || echo "1.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="$MAJOR.$MINOR.$NEW_PATCH"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      # ── 2. ADIM: PROJE HAZIRLA ─────────────────────────────────────
      - name: 🛠️ Dosyaları Hazırla
        run: |
          if [ -d "android" ]; then cp -r android/* .; rm -rf android; fi
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── 3. ADIM: DOSYA İÇERİĞİNİ ZORLA GÜNCELLE ─────────────────────
      - name: ✍️ build.gradle Dosyasını Güncelle
        run: |
          V_NAME="${{ steps.tagger.outputs.tag }}"
          V_CODE="${{ github.run_number }}"
          S_URL="${{ github.event.inputs.server_url || 'https://falzer4.peuplade.com.tr' }}"
          
          # build.gradle içindeki satırları 'sed' ile doğrudan metin olarak değiştiriyoruz
          sed -i "s/versionCode [0-9]*/versionCode $V_CODE/g" app/build.gradle
          sed -i
