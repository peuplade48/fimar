name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔢 Sürüm Bilgilerini Ayarla (Otomatik Artış)
        run: |
          # 1.0.BUILD_NUMARASI şeklinde otomatik artan sürüm adı
          # Build numarasını 230'lardan başlatmak yerine daha temiz bir sayı isterseniz offset ekleyebilirsiniz.
          VERSION_NAME="1.0.${{ github.run_number }}"
          VERSION_CODE=${{ github.run_number }}
          
          # Eğer bir Tag (v1.2.3) basılırsa, sürüm ismini o Tag'den al
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            VERSION_NAME="${TAG_NAME#v}"
          fi
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Final Version: $VERSION_NAME ($VERSION_CODE)"

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Keystore Hazırla
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      - name: 🛠️ Gradle Build (Hata Giderilmiş Versiyon)
        uses: gradle/gradle-build-action@v3
        with:
          # ÖNEMLİ: Projedeki gradlew dosyasını değil, temiz Gradle 8.7 kullan
          gradle-version: 8.7
          arguments: |
            assembleRelease 
            --no-daemon
            -PVERSION_NAME=${{ env.VERSION_NAME }}
            -PVERSION_CODE=${{ env.VERSION_CODE }}
            -PKEYSTORE_FILE=release-key.jks
            -PKEYSTORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }}
            -PKEY_PASS=${{ secrets.KEY_PASSWORD }}

      - name: 📤 APK Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: apartman-takip-${{ env.VERSION_NAME }}
          path: "app/build/outputs/apk/release/*.apk"

      - name: 🚀 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Apartman Takip v${{ env.VERSION_NAME }}"
          tag_name: ${{ github.ref }}
          body: "Otomatik Yayın. Sürüm: ${{ env.VERSION_NAME }} (Build: ${{ env.VERSION_CODE }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
