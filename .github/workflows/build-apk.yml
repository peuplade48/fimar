name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL Adresi'
        required: true
        default: 'https://falzer4.peuplade.com.tr'

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: VERSİYON BELİRLE ────────────────────────────────────
      - name: 🏷️ Versiyonu Artır
        id: tagger
        run: |
          LAST_TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || echo "1.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="$MAJOR.$MINOR.$NEW_PATCH"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      # ── 2. ADIM: PROJE HAZIRLA VE WRAPPER KURTAR ────────────────────
      - name: 🛠️ Gradle Wrapper'ı Kurtar ve Hazırla
        run: |
          if [ -d "android" ]; then cp -r android/* .; rm -rf android; fi
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── 3. ADIM: BUILD (ZORLAMALI PARAMETRELER) ──────────────────────
      - name: 🛠️ APK Build
        run: |
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VER_NAME="${{ steps.tagger.outputs.tag }}"
          VER_CODE=${{ github.run_number }}
          S_URL="${{ github.event.inputs.server_url || 'https://falzer4.peuplade.com.tr' }}"
          
          VARIANT=$(echo "$TYPE" | awk '{print toupper(substr($0,1,1))substr($0,2)}')
          
          ./gradlew clean assemble$VARIANT --no-daemon \
            -Pandroid.injected.versionName="$VER_NAME" \
            -Pandroid.injected.versionCode="$VER_CODE" \
            -Pcustom_server_url="$S_URL" \
            -PKEYSTORE_FILE="release-key.jks" \
            -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASS="${{ secrets.KEY_PASSWORD }}"

      # ── 4. ADIM: GITHUB RELEASE ─────────────────────────────────────
      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: "app/build/outputs/apk/**/*.apk"
          name: "Apartman Takip v${{ steps.tagger.outputs.tag }}"
          tag_name: ${{ steps.tagger.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
