name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔢 Sürüm Bilgilerini Ayarla
        run: |
          VERSION_NAME="1.0.0"
          VERSION_CODE=${{ github.run_number }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$MY_KEYSTORE_SECRET" ]; then
            mkdir -p app
            echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/release-key.jks
          fi

      - name: 🛠️ Gradle Build (Sadece Release)
        uses: gradle/gradle-build-action@v3
        with:
          arguments: |
            assembleRelease 
            --no-daemon
            -PVERSION_NAME="${{ env.VERSION_NAME }}"
            -PVERSION_CODE="${{ env.VERSION_CODE }}"
            -PKEYSTORE_FILE="release-key.jks"
            -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            -PKEY_PASS="${{ secrets.KEY_PASSWORD }}"

      - name: 📤 APK Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: apartman-takip-${{ env.VERSION_NAME }}
          path: "app/build/outputs/apk/release/*.apk"

      - name: 🚀 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Apartman Takip v${{ env.VERSION_NAME }}"
          tag_name: ${{ github.ref }}
          body: "Sürüm: ${{ env.VERSION_NAME }} (Build: ${{ env.VERSION_CODE }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
