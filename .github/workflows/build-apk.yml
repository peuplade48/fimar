name: 🔨 FİMAR APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü seçin'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL'
        required: false
        default: ''

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── KRİTİK DÜZELTME: Doğru Dizin Tespiti ──────────────────────────
      - name: 🔍 Proje Dizinini Tespit Et ve Hazırla
        run: |
          # settings.gradle dosyasının nerede olduğunu bulalım
          SETTINGS_PATH=$(find . -name "settings.gradle" | head -n 1)
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          # O dizine gidip wrapper oluşturalım
          cd "$PROJECT_ROOT"
          gradle wrapper --gradle-version 8.2
          chmod +x ./gradlew
          echo "✅ Proje kök dizini $PROJECT_ROOT olarak belirlendi ve hazırlandı."

      # ── Sunucu URL Güncelle (Opsiyonel) ─────────────────────────────
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          find . -name "MainActivity.kt" -exec sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" {} +
          find . -name "build.gradle" -exec sed -i "s|\"http://192.168.1.100/fimar/index.php\"|\"$SERVER\"|g" {} +

      # ── Release Keystore Hazırla ────────────────────────────────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: (github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')) && env.MY_KEYSTORE_SECRET != ''
        run: |
          APP_DIR=$(find . -name "app" -type d | head -n 1)
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > "$APP_DIR/fimar-release.keystore"

      # ── APK Build (Dinamik Dizinle) ──────────────────────────────────
      - name: 🛠️ APK Build
        run: |
          cd ${{ env.PROJECT_ROOT }}
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          
          if [ "$BUILD_TYPE" == "release" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            if [ -f "app/fimar-release.keystore" ]; then
              ./gradlew assembleRelease --no-daemon \
                -PKEYSTORE_FILE="fimar-release.keystore" \
                -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
                -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
                -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
                -Porg.gradle.jvmargs="-Xmx3g"
            else
              ./gradlew assembleRelease --no-daemon -Porg.gradle.jvmargs="-Xmx3g"
            fi
          else
            ./gradlew assembleDebug --no-daemon -Porg.gradle.jvmargs="-Xmx3g"
          fi

      - name: 📤 APK Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: fimar-apk-${{ github.run_number }}
          path: "**/*.apk"
