name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── VERSİYON BELİRLE ────────────────────────────────────────────
      - name: 🏷️ Versiyonu Artır
        id: tagger
        run: |
          LAST_TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || echo "1.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="$MAJOR.$MINOR.$NEW_PATCH"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      # ── HAZIRLIK ───────────────────────────────────────────────────
      - name: 🛠️ Proje Hazırla
        run: |
          if [ -d "android" ]; then cp -r android/* .; rm -rf android; fi
          rm -rf gradle/ gradlew gradlew.bat
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── KEYSTORE (Sadece Release için) ─────────────────────────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: github.event.inputs.build_type == 'release' && env.MY_KEYSTORE_SECRET != ''
        run: |
          mkdir -p app
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/release-key.jks

      # ── BUILD ──────────────────────────────────────────────────────
      - name: 🛠️ APK Build
        run: |
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VER_NAME="${{ steps.tagger.outputs.tag }}"
          VER_CODE=${{ github.run_number }}
