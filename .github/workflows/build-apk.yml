name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü seçin'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL'
        required: false
        default: ''

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ÖNEMLİ: Versiyonları görebilmesi için tüm geçmişi çeker

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: PROJE YAPISINI KONTROL ET ───────────────────────────
      - name: 🛠️ Klasör Kontrolü
        run: |
          if [ -d "android" ]; then
            cp -r android/* .
            rm -rf android
          fi

      # ── 2. ADIM: GRADLE HAZIRLA ──────────────────────────────────────
      - name: 🛠️ Gradle Wrapper Hazırla
        run: |
          rm -rf gradle/ gradlew gradlew.bat
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── 3. ADIM: URL GÜNCELLEME ──────────────────────────────────────
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          find . -name "MainActivity.kt" -exec sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" {} +

      # ── YENİ ADIM: OTOMATİK VERSİYON ARTIRMA ────────────────────────
      - name: 🏷️ Yeni Versiyon Belirle ve Tag Oluştur
        id: auto_tag
        run: |
          # En son tag'i bul (yoksa v1.0.0'dan başla)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          
          # Versiyonu parçala ve patch numarasını artır
          BASE_VERSION=$(echo $LATEST_TAG | cut -d. -f1,2)
          PATCH_VERSION=$(echo $LATEST_TAG | cut -d. -f3)
          NEW_PATCH=$((PATCH_VERSION + 1))
          NEW_TAG="$BASE_VERSION.$NEW_PATCH"
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          # Git'e yeni tag'i ekle ve gönder
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      # ── 4. ADIM: KEYSTORE HAZIRLA ────────────────────────────────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: (github.event.inputs.build_type == 'release' || steps.auto_tag.outputs.new_tag != '') && env.MY_KEYSTORE_SECRET != ''
        run: |
          mkdir -p app
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/release-key.jks

      # ── 5. ADIM: BUILD ───────────────────────────────────────────────
      - name: 🛠️ APK Build
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" == "release" ]; then
            ./gradlew assembleRelease --no-daemon \
              -PKEYSTORE_FILE="release-key.jks" \
              -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
              -Porg.gradle.jvmargs="-Xmx3g"
          else
            ./gradlew assembleDebug --no-daemon -Porg.gradle.jvmargs="-Xmx3g"
          fi

      # ── 6. ADIM: ARTIFACTS (Geçici Kayıt) ─────────────────────────────
      - name: 📤 APK Geçici Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: apartman-takip-apk-${{ steps.auto_tag.outputs.new_tag }}
          path: "app/build/outputs/apk/**/*.apk"

      # ── 7. ADIM: GITHUB RELEASE (Kalıcı Yayınlama) ───────────────────
      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          name: "Apartman Takip Sürüm ${{ steps.auto_tag.outputs.new_tag }}"
          tag_name: ${{ steps.auto_tag.outputs.new_tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
