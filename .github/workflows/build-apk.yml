name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü seçin'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL'
        required: false
        default: ''

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Geçmiş tagleri görmek için gerekli

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: VERSİYON BELİRLE ────────────────────────────────────
      - name: 🏷️ Versiyonu Artır
        id: tagger
        run: |
          # En son tag'i al (v1.0.0 formatında varsayıyoruz), yoksa 1.0.0'dan başla
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          
          # v1.0.0 -> 1.0.0 (v harfini temizle)
          CLEAN_TAG=${LATEST_TAG#v}
          
          # Parçalara ayır ve patch numarasını artır
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN_TAG"
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "new_tag=v$NEW_TAG" >> $GITHUB_OUTPUT
          echo "clean_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          # GitHub'a yeni tag'i pushla
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$NEW_TAG"
          git push origin "v$NEW_TAG"

      # ── 2. ADIM: PROJE YAPISINI KONTROL ET ───────────────────────────
      - name: 🛠️ Klasör Kontrolü
        run: |
          if [ -d "android" ]; then
            cp -r android/* .
            rm -rf android
          fi

      # ── 3. ADIM: GRADLE HAZIRLA ──────────────────────────────────────
      - name: 🛠️ Gradle Wrapper Hazırla
        run: |
          rm -rf gradle/ gradlew gradlew.bat
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── 4. ADIM: URL GÜNCELLEME ──────────────────────────────────────
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          find . -name "MainActivity.kt" -exec sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" {} +

      # ── 5. ADIM: KEYSTORE HAZIRLA ────────────────────────────────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: (github.event.inputs.build_type == 'release' || steps.tagger.outputs.new_tag != '') && env.MY_KEYSTORE_SECRET != ''
        run: |
          mkdir -p app
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/release-key.jks

      # ── 6. ADIM: BUILD ───────────────────────────────────────────────
      - name: 🛠️ APK Build
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VERSION="${{ steps.tagger.outputs.clean_tag }}"
          
          if [ "$BUILD_TYPE" == "release" ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.versionName="$VERSION" \
              -PKEYSTORE_FILE="release-key.jks" \
              -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
              -Porg.gradle.jvmargs="-Xmx3g"
          else
            ./gradlew assembleDebug --no-daemon \
              -Pandroid.injected.versionName="$VERSION" \
              -Porg.gradle.jvmargs="-Xmx3g"
          fi

      # ── 7. ADIM: ARTIFACTS (Geçici Kayıt) ─────────────────────────────
      - name: 📤 APK Geçici Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: apartman-takip-${{ steps.tagger.outputs.new_tag }}
          path: "app/build/outputs/apk/**/*.apk"

      # ── 8. ADIM: GITHUB RELEASE (Kalıcı Yayınlama) ───────────────────
      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          name: "Apartman Takip Sürüm ${{ steps.tagger.outputs.new_tag }}"
          tag_name: ${{ steps.tagger.outputs.new_tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
