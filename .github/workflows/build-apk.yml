name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü'
        required: true
        default: 'release'
        type: choice
        options: [debug, release]

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Dosyaları Hazırla
        run: |
          # ÖNEMLİ: Alt klasördeki projeyi ana dizine çıkarıyoruz
          if [ -d "android" ]; then 
            cp -r android/* .
            rm -rf android
          fi
          # Gradle Wrapper onarımı
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      - name: 🛠️ APK Build
        run: |
          TYPE="${{ github.event.inputs.build_type || 'release' }}"
          VARIANT=$(echo "$TYPE" | awk '{print toupper(substr($0,1,1))substr($0,2)}')
          
          # V_CODE parametresini kesin olarak gönderiyoruz
          ./gradlew clean assemble$VARIANT --no-daemon \
            -PV_CODE="${{ github.run_number }}"

      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: "app/build/outputs/apk/**/*.apk"
          name: "Apartman Takip v1.0.${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
