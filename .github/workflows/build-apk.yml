name: 🔨 FİMAR APK Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
      - 'app/**' # Eğer dosyalar ana dizindeyse bu da tetiklesin
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü seçin'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      server_url:
        description: 'Örn: https://falzer5.peuplade.com.tr'
        required: false
        default: ''

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest
    
    # NOT: Eğer dosyaların 'android' klasöründe olduğundan eminseniz 
    # aşağıdaki 'defaults' kısmını geri ekleyebilirsiniz. 
    # Ama şu anki hatanız 'gradlew' bulunamadığı için burayı devre dışı bırakıyoruz.

    steps:
      # ── 1. Kod al ──────────────────────────────────────────────────────
      - name: 📥 Kodu İndir (Checkout)
        uses: actions/checkout@v4

      # ── 2. JDK ─────────────────────────────────────────────────────────
      - name: ☕ JDK ${{ env.JAVA_VERSION }} Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── 3. Dosya Yapısını Doğrula (Hata Ayıklama İçin) ──────────────────
      - name: 📂 Dosya Yapısını Listele
        run: ls -R

      # ── 4. Gradle izinleri ─────────────────────────────────────────────
      - name: 🔐 Gradle Wrapper İzni
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          elif [ -f "./android/gradlew" ]; then
            cd android && chmod +x ./gradlew
          else
            echo "❌ gradlew dosyası bulunamadı!"
            exit 1
          fi

      # ── 5. Sunucu URL güncelle (opsiyonel) ─────────────────────────────
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          # Dosyanın nerede olduğunu bul ve sed ile değiştir
          TARGET_FILE=$(find . -name "MainActivity.kt")
          GRADLE_FILE=$(find . -name "build.gradle")
          
          if [ ! -z "$TARGET_FILE" ]; then
            sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" "$TARGET_FILE"
          fi
          if [ ! -z "$GRADLE_FILE" ]; then
            sed -i "s|\"http://192.168.1.100/fimar/index.php\"|\"$SERVER\"|g" "$GRADLE_FILE"
          fi

      # ── 6. Release Keystore Hazırla ────────────────────────────────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: (github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')) && env.MY_KEYSTORE_SECRET != ''
        run: |
          # app klasörünün yerini bul
          APP_PATH=$(find . -name "app" -type d | head -n 1)
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > "$APP_PATH/fimar-release.keystore"
          echo "✓ Release keystore $APP_PATH içine oluşturuldu"

      # ── 7. APK Build (Debug) ───────────────────────────────────────────
      - name: 🛠️ Debug APK Oluştur
        if: github.event.inputs.build_type != 'release' || github.event_name != 'workflow_dispatch'
        run: |
          GRADLE_PATH=$(find . -name "gradlew")
          cd $(dirname $GRADLE_PATH)
          ./gradlew assembleDebug --no-daemon -Porg.gradle.jvmargs="-Xmx3g"

      # ── 8. APK Build (Release) ─────────────────────────────────────────
      - name: 🚀 Release APK Oluştur
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: |
          GRADLE_PATH=$(find . -name "gradlew")
          cd $(dirname $GRADLE_PATH)
          if [ -f "app/fimar-release.keystore" ]; then
            ./gradlew assembleRelease \
              --no-daemon \
              -PKEYSTORE_FILE="fimar-release.keystore" \
              -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
              -Porg.gradle.jvmargs="-Xmx3g"
          else
            ./gradlew assembleRelease --no-daemon -Porg.gradle.jvmargs="-Xmx3g"
          fi

      # ── 9. Artifacts ve Release ───────────────────────────────────────
      - name: 📤 APK Yükle
        uses: actions/upload-artifact@v4
        with:
          name: fimar-apk-build${{ github.run_number }}
          path: "**/*.apk"
          retention-days: 30

      - name: 🏷️ GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.apk"
          name: "FİMAR Su Faturası ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
