name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

permissions:
  contents: write

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: VERSİYON BELİRLE ────────────────────────────────────
      - name: 🏷️ Versiyonu Belirle
        id: versioning
        run: |
          V_CODE="${{ github.run_number }}"
          V_NAME="1.0.$V_CODE"
          echo "v_code=$V_CODE" >> $GITHUB_OUTPUT
          echo "v_name=$V_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$V_NAME" || echo "Tag zaten var."
          git push origin "$V_NAME" || echo "Push yapıldı."

      # ── 2. ADIM: GRADLE HAZIRLIĞI ──────────────────────────────────
      - name: 🛠️ Dosyaları Hazırla
        run: |
          if [ -d "android" ]; then cp -r android/* .; rm -rf android; fi
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── 3. ADIM: APK BUILD (KESİN ÇÖZÜM) ───────────────────────────
      - name: 🛠️ APK Build
        run: |
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VARIANT=$(echo "$TYPE" | awk '{print toupper(substr($0,1,1))substr($0,2)}')
          
          # Parametreyi -P ile doğrudan Gradle'ın kalbine gönderiyoruz
          ./gradlew clean assemble$VARIANT --no-daemon \
            -PV_CODE="${{ steps.versioning.outputs.v_code }}"

      # ── 4. ADIM: RELEASE ───────────────────────────────────────────
      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: "app/build/outputs/apk/**/*.apk"
          name: "Apartman Takip v${{ steps.versioning.outputs.v_name }}"
          tag_name: ${{ steps.versioning.outputs.v_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
