name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build türü seçin'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      server_url:
        description: 'Sunucu URL'
        required: false
        default: ''

# Gerekli yazma izinleri
permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Geçmişi görerek versiyon artırmak için şart

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── 1. ADIM: VERSİYON BELİRLE (Hata Korumalı) ────────────────────
      - name: 🏷️ Versiyonu Artır
        id: tagger
        run: |
          # Sadece sayısal tagleri bul (Örn: 1.0.5), bozuk isimleri görmezden gel
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || echo "1.0.0")
          
          # Versiyonu parçala ve son haneyi artır
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          # Git konfigürasyonu ve Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      # ── 2. ADIM: PROJE YAPISINI DÜZENLE ──────────────────────────────
      - name: 🛠️ Klasör Kontrolü
        run: |
          if [ -d "android" ]; then
            cp -r android/* .
            rm -rf android
          fi

      # ── 3. ADIM: GRADLE HAZIRLA ──────────────────────────────────────
      - name: 🛠️ Gradle Wrapper Hazırla
        run: |
          rm -rf gradle/ gradlew gradlew.bat
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ── 4. ADIM: URL GÜNCELLEME ──────────────────────────────────────
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          find . -name "MainActivity.kt" -exec sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" {} +

      # ── 5. ADIM: KEYSTORE HAZIRLA (Sadece Release Seçilirse) ─────────
      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: github.event.inputs.build_type == 'release' && env.MY_KEYSTORE_SECRET != ''
        run: |
          mkdir -p app
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/release-key.jks

      # ── 6. ADIM: BUILD (Dinamik Versiyon Gömme) ──────────────────────
      - name: 🛠️ APK Build
        run: |
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VER="${{ steps.tagger.outputs.tag }}"
          
          if [ "$TYPE" == "release" ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.versionName="$VER" \
              -PKEYSTORE_FILE="release-key.jks" \
              -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
              -Porg.gradle.jvmargs="-Xmx3g"
          else
            ./gradlew assembleDebug --no-daemon \
              -Pandroid.injected.versionName="$VER" \
              -Porg.gradle.jvmargs="-Xmx3g"
          fi

      # ── 7. ADIM: GITHUB RELEASE (Kalıcı Yayınlama) ───────────────────
      - name: 🚀 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          files: "app/build/outputs/apk/**/*.apk"
          name: "Apartman Takip Sürüm ${{ steps.tagger.outputs.tag }}"
          tag_name: ${{ steps.tagger.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
