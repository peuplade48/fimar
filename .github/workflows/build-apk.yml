name: 🔨 Apartman Takip APK Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Sunucu URL (Opsiyonel)'
        required: false
        default: ''

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 📦 APK Oluştur
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔢 Sürüm Bilgilerini Ayarla
        id: versioning
        run: |
          # Varsayılan değerler
          VERSION_NAME="1.0.0"
          VERSION_CODE=${{ github.run_number }}
          
          # Eğer bir tag (v1.2.3) üzerinden tetiklendiyse sürümü ondan al
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            VERSION_NAME="${TAG_NAME#v}"
          fi
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Final Version: $VERSION_NAME ($VERSION_CODE)"

      - name: ☕ JDK Kur
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # URL güncelleme (Eğer manuel tetiklendiyse)
      - name: 🌐 Sunucu URL Güncelle
        if: github.event.inputs.server_url != ''
        run: |
          SERVER="${{ github.event.inputs.server_url }}"
          find . -name "MainActivity.kt" -exec sed -i "s|private val SERVER_URL = \".*\"|private val SERVER_URL = \"$SERVER\"|g" {} +

      - name: 🛠️ Gradle Hazırla
        run: |
          chmod +x ./gradlew

      - name: 🔑 Release Keystore Hazırla
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$MY_KEYSTORE_SECRET" ]; then
            echo "$MY_KEYSTORE_SECRET" | base64 --decode > app/release-key.jks
          fi

      - name: 🛠️ APK Build (Release)
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PVERSION_NAME="${{ env.VERSION_NAME }}" \
            -PVERSION_CODE="${{ env.VERSION_CODE }}" \
            -PKEYSTORE_FILE="release-key.jks" \
            -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
            -Porg.gradle.jvmargs="-Xmx3g"

      - name: 📤 APK Geçici Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: apartman-takip-${{ env.VERSION_NAME }}-b${{ env.VERSION_CODE }}
          path: "app/build/outputs/apk/release/*.apk"

      - name: 🚀 GitHub Release Oluştur
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Apartman Takip v${{ env.VERSION_NAME }}"
          tag_name: ${{ github.ref }}
          body: "Otomatik oluşturulan sürüm. Build No: ${{ env.VERSION_CODE }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
