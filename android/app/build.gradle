plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// ── SÜRÜM YAKALAMA MANTIĞI ──
// GitHub Actions'dan gelen V_CODE ve V_NAME parametrelerini okur.
// Eğer yoksa (yerel build) varsayılan 1 ve 1.0.0 kullanır.
def g_versionCode = project.findProperty('V_CODE') ? project.property('V_CODE').toInteger() : 1
def g_versionName = project.findProperty('V_NAME') ? project.property('V_NAME') : "1.0.0"
def finalUrl = project.findProperty("custom_server_url") ?: "https://falzer4.peuplade.com.tr"

android {
    namespace 'com.fimar'
    compileSdk 35

    defaultConfig {
        applicationId "com.fimar"
        minSdk 24
        targetSdk 35
        
        // Dinamik değerler buraya yazılıyor
        versionCode g_versionCode
        versionName g_versionName
        
        multiDexEnabled true
        manifestPlaceholders = [appLabel: "FİMAR Su"]
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            buildConfigField "String", "SERVER_URL", "\"${finalUrl}\""
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Test kolaylığı için debug imzası kullanmaya devam ediyoruz
            signingConfig signingConfigs.debug 
            buildConfigField "String", "SERVER_URL", "\"${finalUrl}\""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += ["-opt-in=kotlin.RequiresOptIn"]
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
    }

    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}', 'META-INF/DEPENDENCIES']
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0'
    implementation 'org.json:json:20240303' 
    implementation 'androidx.multidex:multidex:2.0.1'
}
