plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// GitHub'dan gelen değerleri en başta yakalıyoruz
def g_versionCode = project.hasProperty('android.injected.versionCode') ? project.property('android.injected.versionCode').toInteger() : 1
def g_versionName = project.hasProperty('android.injected.versionName') ? project.property('android.injected.versionName') : "1.0.0"

android {
    namespace 'com.apartmantakip'
    compileSdk 35

    defaultConfig {
        applicationId "com.apartmantakip"
        minSdk 24
        targetSdk 35
        
        // Değişkenleri buraya atıyoruz
        versionCode g_versionCode
        versionName g_versionName

        multiDexEnabled true
        manifestPlaceholders = [appLabel: "Apartman Takip"]
    }

    // URL Yapılandırması
    def finalUrl = project.findProperty("custom_server_url") ?: "https://falzer4.peuplade.com.tr"

    signingConfigs {
        release {
            storeFile file(project.findProperty("KEYSTORE_FILE") ?: "release-key.jks")
            storePassword project.findProperty("KEYSTORE_PASS") ?: "apartman123"
            keyAlias project.findProperty("KEY_ALIAS") ?: "apartman-alias"
            keyPassword project.findProperty("KEY_PASS") ?: "apartman123"
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            buildConfigField "String", "SERVER_URL", "\"${finalUrl}\""
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            buildConfigField "String", "SERVER_URL", "\"${finalUrl}\""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
    buildFeatures { buildConfig = true; viewBinding = true }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.credentials:credentials:1.5.0'
    implementation 'androidx.credentials:credentials-play-services-auth:1.5.0'
    implementation 'com.google.android.libraries.identity.googleid:googleid:1.1.1'
}
