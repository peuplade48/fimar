plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// GitHub Actions parametrelerini yakala
def g_versionCode = project.hasProperty('android.injected.versionCode') ? project.property('android.injected.versionCode').toInteger() : 1
def g_versionName = project.hasProperty('android.injected.versionName') ? project.property('android.injected.versionName') : "1.0.0"
def finalUrl = project.findProperty("custom_server_url") ?: "http://192.168.1.100/fimar/index.php"

android {
    namespace 'com.fimar'
    compileSdk 34

    defaultConfig {
        applicationId "com.fimar"
        minSdk 24
        targetSdk 34
        
        versionCode g_versionCode
        versionName g_versionName
        
        multiDexEnabled true
        manifestPlaceholders = [appLabel: "FİMAR Su"]
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            signingConfig signingConfigs.debug
            buildConfigField "String", "SERVER_URL", "\"${finalUrl}\""
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug // Test için debug imzası devam ediyor
            buildConfigField "String", "SERVER_URL", "\"${finalUrl}\""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += ["-opt-in=kotlin.RequiresOptIn"]
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
    }

    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}', 'META-INF/DEPENDENCIES']
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0'
    implementation 'org.json:json:20240303' 
    implementation 'androidx.multidex:multidex:2.0.1'
}
