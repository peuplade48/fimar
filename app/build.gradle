plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.fimar'
    compileSdk 34

    defaultConfig {
        applicationId "com.fimar"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true

        manifestPlaceholders = [appLabel: "FİMAR Su"]
    }

    signingConfigs {
        debug {
            // GitHub Actions'da dosya yoksa hata vermemesi için kontrol ekliyoruz
            if (file("debug.keystore").exists()) {
                storeFile file("debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
        release {
            // Keystore dosyası varsa imzalar, yoksa debug imzasını veya boş geçer
            def ksFile = project.hasProperty("KEYSTORE_FILE") ? file(KEYSTORE_FILE) : file("debug.keystore")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword project.hasProperty("KEYSTORE_PASS") ? KEYSTORE_PASS : "android"
                keyAlias project.hasProperty("KEY_ALIAS") ? KEY_ALIAS : "androiddebugkey"
                keyPassword project.hasProperty("KEY_PASS") ? KEY_PASS : "android"
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            // Dosya varsa imzala, yoksa imzasız (unsigned) devam et
            signingConfig file("debug.keystore").exists() ? signingConfigs.debug : null
            buildConfigField "String", "SERVER_URL", '"http://192.168.1.100/fimar/index.php"'
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Release imza dosyası yoksa hata vermemesi için null kontrolü
            def releaseExists = project.hasProperty("KEYSTORE_FILE") && file(KEYSTORE_FILE).exists()
            signingConfig releaseExists ? signingConfigs.release : null
            buildConfigField "String", "SERVER_URL", '"http://192.168.1.100/fimar/index.php"'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += ["-opt-in=kotlin.RequiresOptIn"]
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
    }

    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}', 'META-INF/DEPENDENCIES']
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0'
    
    // JSON kütüphanesi
    implementation 'org.json:json:20240303' 

    implementation 'androidx.multidex:multidex:2.0.1'
}
