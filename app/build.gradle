plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    // Namespace ve SDK ayarları
    namespace 'com.fimar'
    compileSdk 34

    defaultConfig {
        applicationId "com.fimar"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true

        manifestPlaceholders = [appLabel: "FİMAR Su"]
    }

    // DİKKAT: signingConfigs bloğunu tamamen kaldırdık. 
    // GitHub Actions'da dosya olmadığı için hata veriyordu.

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            
            // KRİTİK: GitHub Actions'da keystore hatası almamak için imza kontrolünü kapatıyoruz.
            // APK "unsigned" (imzasız) olarak üretilecek.
            signingConfig null 
            
            buildConfigField "String", "SERVER_URL", '"http://192.168.1.100/fimar/index.php"'
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // Release build'de de GitHub ortamında hata vermemesi için null geçiyoruz
            signingConfig null
            
            buildConfigField "String", "SERVER_URL", '"http://192.168.1.100/fimar/index.php"'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += ["-opt-in=kotlin.RequiresOptIn"]
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
    }

    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}', 'META-INF/DEPENDENCIES']
        }
    }

    // Kaynak (Resource) hatalarını (a.png gibi) build'i durdurmaması için esnetiyoruz
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0'
    
    // JSON kütüphanesi
    implementation 'org.json:json:20240303' 

    implementation 'androidx.multidex:multidex:2.0.1'
}
